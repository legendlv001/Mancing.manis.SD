<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 512 512">

  <defs>

    <linearGradient id="bg"
        x1="0%" y1="0%"
        x2="0%" y2="100%">

      <stop offset="0%"
            stop-color="#38bdf8"/>

      <stop offset="100%"
            stop-color="#0369a1"/>

    </linearGradient>

    <linearGradient id="fish"
        x1="0%"
        y1="0%"
        x2="100%"
        y2="100%">

      <stop offset="0%"
            stop-color="#7dd3fc"/>

      <stop offset="100%"
            stop-color="#2563eb"/>

    </linearGradient>

  </defs>

  <!-- Background -->

  <rect
      width="512"
      height="512"
      rx="90"
      fill="url(#bg)"/>

  <!-- Matahari -->

  <circle
      cx="410"
      cy="95"
      r="42"
      fill="#fde047"/>

  <!-- Ombak -->

  <path
      d="
      M0 340
      Q40 315 80 340
      T160 340
      T240 340
      T320 340
      T400 340
      T480 340
      T560 340
      V512
      H0
      Z"

      fill="#0ea5e9"/>

  <!-- Ikan -->

  <ellipse

      cx="220"

      cy="245"

      rx="90"

      ry="55"

      fill="url(#fish)"/>

  <polygon

      points="295,245
              380,185
              380,305"

      fill="#2563eb"/>

  <polygon

      points="205,195
              235,150
              255,195"

      fill="#1d4ed8"/>

  <circle

      cx="170"

      cy="235"

      r="6"

      fill="#111827"/>

  <!-- Kail -->

  <path

      d="

      M255 40

      V150

      "

      stroke="white"

      stroke-width="6"

      fill="none"/>

  <path

      d="

      M255 150

      C255 190

      275 215

      305 230

      "

      stroke="white"

      stroke-width="6"

      fill="none"/>

  <path

      d="

      M305 230

      q15 18

      -6 35

      q-18 15

      -34 -2

      "

      stroke="white"

      stroke-width="6"

      fill="none"/>

  <!-- Gelembung -->

  <circle
      cx="120"
      cy="120"
      r="6"
      fill="white"
      opacity=".7"/>

  <circle
      cx="95"
      cy="155"
      r="10"
      fill="white"
      opacity=".5"/>

  <circle
      cx="420"
      cy="230"
      r="8"
      fill="white"
      opacity=".5"/>

</svg>
